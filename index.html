<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Games News App</title>

<link rel="icon" href="assets/favicon.ico">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">🎮 Games News</span>

    <button id="modoToggle" class="btn btn-outline-light">🌙</button>
  </div>
</nav>

<!-- LOADER -->
<div id="loader" class="loader d-none">
    <div class="spinner"></div>
</div>

<div class="container mt-4">

    <!-- IP -->
    <div class="alert alert-info">
        🌐 Tu IP: <span id="ip"></span>
    </div>

   <div class="card p-3 shadow-sm mb-4">
    <div class="row">

        <!-- LISTA 1 A 14 -->
        <div class="col-md-4">
            <label>Cantidad de noticias</label>
            <select id="limite" class="form-select">
                <script>
                    for (let i = 1; i <= 14; i++) {
                        document.write(`<option value="${i}">${i}</option>`);
                    }
                </script>
            </select>
        </div>

        <!-- CATEGORÍAS -->
        <div class="col-md-4">
            <label>Categoría</label>
         <select id="categoria" class="form-select">
    <option value="all">Todos</option>
    <option value="low">Impacto Bajo</option>
    <option value="medium">Impacto Medio</option>
    <option value="high">Impacto Alto</option>
</select>
        </div>

        <!-- BOTÓN -->
        <div class="col-md-4 d-flex align-items-end">
            <button id="buscar" class="btn btn-primary w-100">
                🔍 Cargar noticias
            </button>
        </div>

    </div>
</div>

<h2 class="mb-3">📈 Análisis de Eventos Económicos</h2>
    <!-- RESULTADOS -->
    <div id="resultados" class="row g-3"></div>

</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    Tu Nombre | 2026
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
